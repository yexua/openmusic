name: Android APK

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: '远程站点 URL（与 CLIENT_URL 一致）'
        required: true
        default: 'https://qqovo.top'
      build_type:
        description: '构建类型'
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Sync Capacitor (remote URL)
        env:
          CAPACITOR_SERVER_URL: ${{ inputs.server_url }}
        run: npm run cap:sync:android
        working-directory: client

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi
        working-directory: client

      - name: Prepare APK
        run: cp "client/android/app/build/outputs/apk/${{ inputs.build_type }}/"*.apk openmusic.apk
        working-directory: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openmusic-${{ inputs.build_type }}-${{ github.run_number }}
          path: openmusic.apk
          if-no-files-found: error
